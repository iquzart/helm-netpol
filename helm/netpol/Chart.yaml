apiVersion: v2
name: netpol
description: >
  A flexible and production-ready Helm chart for managing Kubernetes
  NetworkPolicies at the namespace level.

  Features:
    - Global default deny (Ingress + Egress)
    - Auto-injected must-have rules (DNS, metrics-server, kubelet probes, kube-apiserver)
    - Pre-built policy patterns (Istio, internet egress, namespace isolation)
    - Multi-value support for CIDRs, namespaces, ports, and selectors
    - Fully customizable user-defined NetworkPolicies
    - Designed for Azure CNI, Istio-enabled clusters, and multi-environment reuse
type: application
version: 1.0.0
appVersion: "1.0.0"

kubeVersion: ">=1.24.0-0"

keywords:
  - kubernetes
  - networking
  - networkpolicy
  - security
  - zero-trust
  - namespace-isolation
  - cni

home: https://kubernetes.io/docs/concepts/services-networking/network-policies/

sources:
  - https://github.com/kubernetes/kubernetes
  - https://learn.microsoft.com/azure/aks/use-network-policies

maintainers:
